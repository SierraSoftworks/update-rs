name: Release

# Publishes update-rs to crates.io when a GitHub Release is published.
#
# The release's tag drives the version: tag format is `vX.Y.Z` (e.g. `v1.0.0`).
# The version baked into the published crate is derived from the tag at publish
# time — `Cargo.toml` is patched with `sed` rather than committed ahead of
# release, so the in-repo version can stay at a development placeholder.
#
# Authentication uses crates.io Trusted Publishing (OIDC) — no long-lived API
# token is stored in GitHub. This requires a one-time setup on crates.io:
#   Crate settings -> Trusted Publishing -> add a GitHub publisher for
#   repository `SierraSoftworks/update-rs`, workflow `release.yml`.
# (The crate name `update-rs` must already be registered/owned on crates.io; for
# the very first publish you may need to fall back to a token once, then enable
# trusted publishing.)

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for crates.io Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set crate version from release tag
        env:
          # Passed via env (not interpolated into the script) to avoid shell injection.
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Releasing version ${VERSION} (from tag ${TAG})"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          grep -m1 '^version = ' Cargo.toml

      - name: Test before publishing
        run: cargo test --all-features --no-fail-fast

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1.0.5

      - name: Publish
        # --allow-dirty: Cargo.toml/Cargo.lock are patched with the tag version
        # at build time and intentionally left uncommitted.
        run: cargo publish --allow-dirty --token ${{ steps.auth.outputs.token }}
