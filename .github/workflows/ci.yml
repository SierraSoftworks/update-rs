name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # NOTE: The test binaries are named `update_rs-<hash>.exe`, which trips
      # Windows' installer-detection heuristic and would otherwise fail to launch
      # with ERROR_ELEVATION_REQUIRED (740). `.cargo/config.toml` sets
      # `__COMPAT_LAYER=RunAsInvoker` so Cargo launches them without elevation.
      - name: cargo test (default features)
        run: cargo test --no-fail-fast

      # `tracing` without `opentelemetry` is the one feature combination the
      # default and all-features runs don't exercise (opentelemetry implies
      # tracing), so cover it explicitly to catch feature-gating rot.
      - name: cargo test (tracing only)
        run: cargo test --features tracing --no-fail-fast

      - name: cargo test (all features)
        run: cargo test --all-features --no-fail-fast

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo doc
        run: cargo doc --all-features --no-deps
