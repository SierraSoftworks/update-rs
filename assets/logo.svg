<svg viewBox="0 0 660 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="update-rs">
  <title>update-rs — self-contained in-place updates for Rust applications</title>
  <defs>
    <linearGradient id="refresh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5e9bff"/>
      <stop offset="45%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#14306e"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <style>
      .word { fill: #23272f; }
      @media (prefers-color-scheme: dark) {
        .word { fill: #f5f6f8; }
      }
    </style>
  </defs>

  <!-- Refresh glyph (same construction as icon.svg), seated in the left band. -->
  <g transform="translate(0,5)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 118.64 69.65 A 40 40 0 0 1 51.72 108.28" fill="none" stroke="url(#refresh)" stroke-width="13"/>
    <path d="M 41.36 90.35 A 40 40 0 0 1 108.28 51.72" fill="none" stroke="url(#refresh)" stroke-width="13"/>
    <path d="M 40.4 97 L 60.2 99.8 L 43.2 116.8 Z" fill="url(#refresh)"/>
    <path d="M 119.6 63 L 99.8 60.2 L 116.8 43.2 Z" fill="url(#refresh)"/>

    <path d="M 118.64 69.65 A 40 40 0 0 1 51.72 108.28" fill="none" stroke="url(#gloss)" stroke-width="13"/>
    <path d="M 41.36 90.35 A 40 40 0 0 1 108.28 51.72" fill="none" stroke="url(#gloss)" stroke-width="13"/>
    <path d="M 40.4 97 L 60.2 99.8 L 43.2 116.8 Z" fill="url(#gloss)"/>
    <path d="M 119.6 63 L 99.8 60.2 L 116.8 43.2 Z" fill="url(#gloss)"/>
  </g>

  <!-- Wordmark: "update" neutral, "-rs" in the brand gradient. A single
       textLength on the <text> element fits the whole word as one run, so the
       "-rs" is positioned reliably and never clipped by the right edge. -->
  <text x="190" y="123" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="104" font-weight="800" textLength="420" lengthAdjust="spacingAndGlyphs">
    <tspan class="word">update</tspan><tspan fill="url(#rs)">-rs</tspan>
  </text>
</svg>
